description: >-
  FinOps view of Sea Machines Robotics spend. Sea Machines sells embedded
  autonomy systems (SM300-SP, SM300-NG), AI-ris computer vision, and the
  FleetViewer platform as hardware-plus-software solutions, with SMLink
  Streaming-API and SMLink Control-API access provisioned to approved
  partners. There is no public usage-based pricing or billing meter for the
  APIs; cost is driven by negotiated per-vessel or per-program agreements
  rather than metered API consumption. Meters below are placeholders and are
  not reconciled against any published billing model.
notes: >-
  No public pricing or billing exports exist. Treat costs as capital and
  contract spend per vessel/program; reconcile against the actual Sea Machines
  agreement during onboarding.
