principles:
- name: Visibility
  description: Track per-vessel and per-program agreements; there is no self-service API usage export to pull.
- name: Allocation
  description: Map autonomy systems, AI-ris units, and SMLink integrations to the vessels/programs they serve.
- name: Optimization
  description: Negotiate fleet-level terms; use FleetViewer (no-code) where programmatic SMLink integration is not required.
- name: Accountability
  description: Assign program owners and review contract spend against vessel deployment plans.
