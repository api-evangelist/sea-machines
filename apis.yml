aid: sea-machines
url: https://raw.githubusercontent.com/api-evangelist/sea-machines/refs/heads/main/apis.yml
name: Sea Machines Robotics
kind: company
description: Sea Machines Robotics builds autonomous command-and-control systems
  (SM300-SP, SM300-NG) and computer-vision perception (AI-ris) for commercial and
  defense marine vessels. In September 2025 it announced the SMLink Streaming-API
  and SMLink Control-API, partner-gated interfaces that stream real-time vessel
  telemetry to external systems and let approved third parties command SM300
  autonomy functions from their own mission software. These interfaces are
  embedded, vessel-side product features, not a self-service public developer
  platform; access is arranged through Sea Machines sales.
