apis:
- aid: sea-machines:smlink-streaming-api
  name: SMLink Streaming-API
  tags:
  - Telemetry
  - Streaming
  - Integration
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://sea-machines.com/sea-machines-launches-marine-autonomy-apis-for-third-party-c2-systems/
  properties:
  - url: https://sea-machines.com/sea-machines-launches-marine-autonomy-apis-for-third-party-c2-systems/
    type: Documentation
  - url: openapi/sea-machines-openapi.yml
    type: OpenAPI
  description: Partner-gated interface announced September 2025 that delivers
    real-time SM300 vessel telemetry and data feeds (position, heading, mechanical
    and navigational state) to external command-and-control and mission systems.
    Supported on the SM300-SP and SM300-NG autonomy systems. No public endpoints,
    base URL, protocol, or developer documentation are published; access is
    arranged through Sea Machines sales, so this is documented as an embedded
    product feature rather than a public API.
- aid: sea-machines:smlink-control-api
  name: SMLink Control-API
  tags:
  - Command and Control
  - Integration
  - Autonomy
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://sea-machines.com/sea-machines-launches-marine-autonomy-apis-for-third-party-c2-systems/
  properties:
  - url: https://sea-machines.com/sea-machines-launches-marine-autonomy-apis-for-third-party-c2-systems/
    type: Documentation
  - url: openapi/sea-machines-openapi.yml
    type: OpenAPI
  description: Partner-gated interface announced September 2025 that grants select
    partners the ability to command SM300 autonomy functions directly from
    third-party mission software. Supported on the SM300-SP and SM300-NG autonomy
    systems. No public endpoints, base URL, protocol, or developer documentation
    are published; access is restricted to approved partners via Sea Machines
    sales, so this is documented as an embedded product feature rather than a
    public API.
- aid: sea-machines:sm300-autonomous-control
  name: SM300 Autonomous Command and Control
  tags:
  - Autonomy
  - Command and Control
  - USV
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://sea-machines.com/
  properties:
  - url: https://sea-machines.com/sm300-ng/
    type: Documentation
  - url: https://sea-machines.com/sm300-sp/
    type: Documentation
  description: Industrial-grade vessel intelligence system providing operator-in-the-loop
    autonomous command and control, multi-waypoint missions, search and survey,
    patrol and surveillance, and remote command. Available as the attritable
    SM300-SP and the class-approved SM300-NG. This is an embedded vessel-side
    product; the SMLink APIs are the integration surface, no standalone public
    HTTP API is documented.
- aid: sea-machines:ai-ris-perception
  name: AI-ris Computer Vision
  tags:
  - Computer Vision
  - Perception
  - Situational Awareness
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://sea-machines.com/product/ai-ris-computer-vision-center/
  properties:
  - url: https://sea-machines.com/product/ai-ris-computer-vision-center/
    type: Documentation
  description: AI-ris (Artificial Intelligence Recognition and Identification
    System) ingests 4K imagery and processes it on-device with embedded AI/ML to
    detect, track, classify, and geolocate vessel traffic and obstacles day or
    night for maritime situational awareness. AI-ris contacts surface in
    FleetViewer; this is an embedded perception product with no documented public
    API of its own.
- aid: sea-machines:fleetviewer
  name: FleetViewer
  tags:
  - Fleet Monitoring
  - Telemetry
  - Dashboard
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://sea-machines.com/fleetviewer/
  properties:
  - url: https://sea-machines.com/fleetviewer/
    type: Documentation
  description: Browser-based fleet monitoring and analysis platform for SM300-equipped
    vessels, offering real-time and historical telemetry at 5-second intervals,
    mechanical and navigational data (radar, ARPA, AIS, AI-ris contacts), mission
    playback, and exportable logs. FleetViewer is a no-code ready-to-use tool, not
    an API; the SMLink APIs cover programmatic integration.
