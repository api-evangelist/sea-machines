description: >-
  Sea Machines Robotics does not publish public pricing for its products or
  for the SMLink Streaming-API and SMLink Control-API. The autonomy systems
  (SM300-SP, SM300-NG), AI-ris perception, and FleetViewer are sold as
  hardware-plus-software solutions, and SMLink API access is partner-gated.
  Pricing, packaging, and any per-vessel or per-seat terms are negotiated
  directly through Sea Machines sales rather than offered as self-service
  tiers. No plan entries are reconciled in this artifact.
notes: >-
  Contact Sea Machines sales (pbourque@sea-machines.com) for commercial and
  partner-integration terms. Update this artifact on reconciliation if Sea
  Machines publishes packaged plans or API pricing.
